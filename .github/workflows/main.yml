name: Build Mitch (fix vérification MAJ)

on:
  # Lancement manuel depuis l'onglet Actions de GitHub
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4

      - name: Configurer Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurer le cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Appliquer le fix (csrf_token manquant dans fetchDownloadUrl)
        run: |
          FILE="app/src/main/kotlin/client/ItchWebsiteParser.kt"

          # Vérifie que le bug est bien présent (FormBody vide dans fetchDownloadUrl)
          if grep -q 'suspend fun fetchDownloadUrl' "$FILE"; then
            echo "✅ Fichier trouvé, application du patch..."

            # Remplace le FormBody vide par un FormBody avec csrf_token
            # On cible uniquement le bloc dans fetchDownloadUrl (après la ligne uriBuilder.appendPath("download_url"))
            python3 - <<'PYEOF'
          import re

          with open("app/src/main/kotlin/client/ItchWebsiteParser.kt", "r") as f:
              content = f.read()

          # Repère la fonction fetchDownloadUrl et remplace le FormBody vide à l'intérieur
          old = '''    suspend fun fetchDownloadUrl(storeUrl: String): DownloadUrl? {
          val result = withContext(Dispatchers.IO) {
                  Log.d(LOGGING_TAG, "Fetching download URL for $storeUrl")
                  val storeUriParsed = storeUrl.toUri()

                  val uriBuilder = storeUriParsed.buildUpon()
                  uriBuilder.appendPath("download_url")
                  val getDownloadPathUri = uriBuilder.build()

                  val form = FormBody.Builder().run {
                      build()
                  }'''

          new = '''    suspend fun fetchDownloadUrl(storeUrl: String): DownloadUrl? {
          val result = withContext(Dispatchers.IO) {
                  Log.d(LOGGING_TAG, "Fetching download URL for $storeUrl")
                  val storeUriParsed = storeUrl.toUri()

                  val uriBuilder = storeUriParsed.buildUpon()
                  uriBuilder.appendPath("download_url")
                  val getDownloadPathUri = uriBuilder.build()

                  val form = FormBody.Builder().run {
                      add("csrf_token", "Mitch-automated")
                      build()
                  }'''

          if old in content:
              content = content.replace(old, new)
              with open("app/src/main/kotlin/client/ItchWebsiteParser.kt", "w") as f:
                  f.write(content)
              print("✅ Patch appliqué avec succès !")
          else:
              # Tentative alternative : patch plus simple sur le FormBody vide
              # (au cas où l'indentation diffère légèrement)
              pattern = r'(suspend fun fetchDownloadUrl.*?val form = FormBody\.Builder\(\)\.run \{)\n(\s*)(build\(\))'
              replacement = r'\1\n\2    add("csrf_token", "Mitch-automated")\n\2\3'
              new_content = re.sub(pattern, replacement, content, flags=re.DOTALL)
              if new_content != content:
                  with open("app/src/main/kotlin/client/ItchWebsiteParser.kt", "w") as f:
                      f.write(new_content)
                  print("✅ Patch appliqué (méthode alternative) !")
              else:
                  print("⚠️  Patch déjà appliqué ou structure inattendue — aucune modification.")
          PYEOF
          else
            echo "❌ Fichier introuvable : $FILE"
            exit 1
          fi

      - name: Vérifier le patch
        run: |
          echo "--- Contenu autour de fetchDownloadUrl après patch ---"
          grep -A 20 "suspend fun fetchDownloadUrl" \
            app/src/main/kotlin/client/ItchWebsiteParser.kt

      - name: Rendre gradlew exécutable
        run: chmod +x gradlew

      - name: Compiler l'APK (flavor fdroid, debug signé)
        run: ./gradlew assembleFdroidDebug --no-daemon --stacktrace

      - name: Publier l'APK en artefact téléchargeable
        uses: actions/upload-artifact@v4
        with:
          name: mitch-patched-fdroid-debug
          path: app/build/outputs/apk/fdroid/debug/app-fdroid-debug.apk
          retention-days: 30
